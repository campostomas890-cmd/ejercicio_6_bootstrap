<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Mi Sitio Bootstrap</a>
        </div>
    </nav>

    <!--LAYOUT:contenedor principal-->
    <div class="container my-5">
        <!--COMPONENTE:TIPOGRAFIA Y UTILIDADES-->
        <header class="text-center mb-5">
            <h1 class="display-4 text-primary">Contenidos de la boostrap</h1>
            <p class="lead border-bottom pb-3">Utilizando componentes de la Unidad 2.</p>
        </header>
    </div>
    
    <div class="row">
        <!--COMPONENTE:IMAGEN RESPONSIVE-->
        <div class="col-md-6 mb-4">
            <h3 class="h5">componente:imagen</h3>
            <img src="prueba.jpg" class="img-fluid rounded shadow"alt="Imagen de prueba">
        </div>
        </div>

        <!-- COMPONENTE: FORMULARIO  -->
            <div class="col-md-6 mb-4">
                <h3 class="h5">Componente: Formulario</h3>
                <form class="p-3 border rounded bg-light">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" placeholder="Tu nombre">
                    </div>
                    <!-- cerrar el textarea-->
                    <div class="mb-3">
                        <label for="mensaje" class="form-label">Mensaje</label>
                        <textarea class="form-control" id="mensaje" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Enviar</button>
                </form>
            </div>
        </div>
        <!-- COMPONENTE: TABLA-->
        <div class="mt-5">
            <h3 class="h5 text-secondary">Componente: Tabla de Utilidades</h3>
            <table class="table table-hover table-bordered border-primary">
                <thead class="table-dark">
                    <tr>
                        <th>Utilidad</th>
                        <th>Clase aplicada</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Color de Fondo</td>
                        <td><span class="badge bg-info text-dark">bg-info</span></td>
                        <td>Aplicado</td>
                    </tr>
                    <tr>
                        <td>Bordes</td>
                        <td><span class="badge border border-danger text-danger">border-danger</span></td>
                        <td>Aplicado</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- JS de Bootstrap (Bundle que incluye Popper) [3, 8] -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
